<script>
        window.switchTab = function(tabId) {
            try {
                // 1. Ocultar todos los tabs
                document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
                
                // 2. Quitar estilos activos del menú
                document.querySelectorAll('aside nav button').forEach(btn => {
                    btn.classList.remove('bg-slate-800', 'border-emerald-500', 'text-white');
                    btn.classList.add('border-transparent');
                });

                // 3. Mostrar tab seleccionado
                const targetTab = document.getElementById(tabId);
                if (targetTab) targetTab.classList.remove('hidden');
                
                // 4. Activar botón del menú
                const activeBtn = document.getElementById('btn-' + tabId);
                if (activeBtn) {
                    activeBtn.classList.remove('border-transparent');
                    activeBtn.classList.add('bg-slate-800', 'border-emerald-500', 'text-white');
                }

                // 5. Redibujar gráfica si entramos al simulador
                if (tabId === 'tab2' && window.chartInstance) {
                    window.chartInstance.resize();
                }
            } catch (error) {
                console.error("Error en la navegación:", error);
            }
        };
    </script>

    <script>
        window.currentSecret = "";
        window.BASE_SIZE = 1500;
        window.historyData = [];
        window.chartInstance = null;

        window.initChart = function() {
            try {
                const canvas = document.getElementById('sizeChart');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                window.chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: { labels: [], datasets: [{ label: 'Bytes', data: [], borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', fill: true, tension: 0.2, pointRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { suggestedMin: 1498, suggestedMax: 1510 } }, plugins: { legend: { display: false } } }
                });
            } catch (e) {
                console.error("Error al cargar la gráfica. Posible bloqueo del CDN de Chart.js", e);
            }
        };

        window.updateUI = function() {
            if(window.chartInstance) {
                window.chartInstance.data.labels = window.historyData.map(d => `#${d.id}`);
                window.chartInstance.data.datasets[0].data = window.historyData.map(d => d.size);
                window.chartInstance.update();
            }
            const tbody = document.querySelector('#historyTable tbody');
            if (tbody) {
                tbody.innerHTML = '';
                [...window.historyData].reverse().forEach(row => {
                    const bgClass = row.isHighlight ? 'bg-red-50 border-l-4 border-red-500 font-bold' : 'border-b';
                    tbody.insertAdjacentHTML('beforeend', `<tr class="${bgClass} hover:bg-slate-50">
                        <td class="px-6 py-3">#${row.id}</td><td class="px-6 py-3 font-mono text-pink-600">${row.payload}</td>
                        <td class="px-6 py-3 text-center font-bold">${row.size} B</td><td class="px-6 py-3">${row.insight}</td></tr>`);
                });
            }
        };

        window.resetSim = function() {
            window.historyData = [];
            const banner = document.getElementById('successBanner');
            if(banner) banner.classList.add('hidden');
            window.updateUI();
        };

        window.generateNewTarget = function() {
            const chars = "ABCDEF123456";
            window.currentSecret = "";
            for (let i = 0; i < 4; i++) window.currentSecret += chars.charAt(Math.floor(Math.random() * chars.length));
            const span = document.getElementById('secretSpan');
            if(span) span.textContent = window.currentSecret;
            window.resetSim();
        };

        window.sendRequest = function() {
            const inputField = document.getElementById('attackerInput');
            if (!inputField || !inputField.value) return;
            const payload = inputField.value.toUpperCase();

            let matchLength = 0;
            for (let i = 0; i < payload.length; i++) {
                if (payload[i] === window.currentSecret[i]) matchLength++; else break;
            }

            const simulatedSize = window.BASE_SIZE + payload.length - matchLength;
            let insight = `<span class="text-slate-500">Sin coincidencia.</span>`;
            let isHighlight = false;

            if (window.historyData.length > 0 && simulatedSize < (window.BASE_SIZE + payload.length)) {
                insight = `<span class="text-red-600">⚠️ Coincidencia (Caída de Tamaño)</span>`;
                isHighlight = true;
            }

            window.historyData.push({ id: window.historyData.length + 1, payload: payload, size: simulatedSize, insight: insight, isHighlight: isHighlight });
            window.updateUI();
            
            if (payload === window.currentSecret) {
                const banner = document.getElementById('successBanner');
                if(banner) banner.classList.remove('hidden');
            }
            inputField.value = ''; inputField.focus();
        };

        const attInput = document.getElementById("attackerInput");
        if(attInput) {
            attInput.addEventListener("keypress", e => { if (e.key === "Enter") { e.preventDefault(); window.sendRequest(); } });
        }
    </script>

    <script>
        window.ucSteps = [
            { title: "Paso 1: Petición Inicial", desc: "El usuario realiza una petición HTTPS a un endpoint protegido, enviando su cookie de sesión.", code: "GET /search?q=atk HTTP/1.1\nCookie: session=ABC12" },
            { title: "Paso 2: Procesamiento", desc: "El servidor procesa la petición y prepara el cuerpo del documento (HTML/JSON) y las cabeceras.", code: "// Backend\nconst response = { html: 'Resultados...', headers: {...} };" },
            { title: "Paso 3: Separación de Contextos", desc: "El sistema comprime el cuerpo con gzip para optimizar, pero EXCLUYE explícitamente las cabeceras con secretos.", code: "gzip(cuerpoHTTP); // OK\n// Las Cookies NO se comprimen juntas" },
            { title: "Paso 4: Ofuscación (Padding)", desc: "Se inyectan bytes aleatorios en el cuerpo para alterar la longitud final.", code: "body += generateRandomPadding(10 a 50 bytes);" },
            { title: "Paso 5: Cifrado y Transmisión", desc: "El paquete completo se cifra mediante TLS 1.3. El Oráculo de tamaño queda ciego.", code: "AES-GCM-Encrypt(paqueteFinal);\n-> Enviar cliente" }
        ];
        
        window.currentStep = 0;

        window.initUseCase = function() {
            const indicators = document.getElementById('stepIndicators');
            if(!indicators) return;
            indicators.innerHTML = '';
            window.ucSteps.forEach((_, i) => {
                indicators.innerHTML += `<div id="indicator-${i}" class="w-8 h-8 rounded-full border-2 border-slate-300 bg-white flex items-center justify-center font-bold text-slate-400 text-sm z-10">${i+1}</div>`;
            });
            window.renderStep();
        };

        window.renderStep = function() {
            const step = window.ucSteps[window.currentStep];
            document.getElementById('stepTitle').textContent = step.title;
            document.getElementById('stepDesc').textContent = step.desc;
            
            const codeBlock = document.getElementById('stepCode');
            codeBlock.textContent = step.code;
            codeBlock.classList.remove('hidden');

            document.getElementById('stepCounter').textContent = `Paso ${window.currentStep + 1} de ${window.ucSteps.length}`;
            document.getElementById('btnPrev').disabled = window.currentStep === 0;
            
            const btnNext = document.getElementById('btnNext');
            if(window.currentStep === window.ucSteps.length - 1) {
                btnNext.textContent = "Finalizar";
                btnNext.classList.replace('bg-emerald-500', 'bg-blue-600');
            } else {
                btnNext.textContent = "Siguiente";
                btnNext.classList.replace('bg-blue-600', 'bg-emerald-500');
            }

            window.ucSteps.forEach((_, i) => {
                const ind = document.getElementById(`indicator-${i}`);
                if(!ind) return;
                if(i < window.currentStep) ind.className = "w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold text-sm z-10";
                else if(i === window.currentStep) ind.className = "w-8 h-8 rounded-full border-4 border-emerald-500 bg-white text-emerald-600 flex items-center justify-center font-bold text-sm z-10 ring-4 ring-emerald-100";
                else ind.className = "w-8 h-8 rounded-full border-2 border-slate-300 bg-white flex items-center justify-center font-bold text-slate-400 text-sm z-10";
            });

            const progress = (window.currentStep / (window.ucSteps.length - 1)) * 100;
            document.getElementById('progressLine').style.width = `${progress}%`;
        };

        window.nextStep = function() {
            if (window.currentStep < window.ucSteps.length - 1) {
                window.currentStep++;
                window.renderStep();
            } else {
                alert("Flujo de seguridad validado exitosamente.");
                window.switchTab('tab4');
            }
        };

        window.prevStep = function() {
            if (window.currentStep > 0) {
                window.currentStep--;
                window.renderStep();
            }
        };

        // --- ARRANQUE GLOBAL (Protegido) ---
        try { window.initChart(); } catch(e){}
        try { window.generateNewTarget(); } catch(e){}
        try { window.initUseCase(); } catch(e){}
    </script>
